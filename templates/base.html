<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Budget Optimizer{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        nav {
            background: #1a1a2e;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        nav .brand {
            color: #4ecca3;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
        }

        nav .nav-links a {
            color: #ccc;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        nav .nav-links a:hover { color: #4ecca3; }

        /* ── Flash messages ── */
        .flash-container { max-width: 900px; margin: 1rem auto; padding: 0 1rem; }

        .flash {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .flash.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* ── Main content ── */
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* ── Cards ── */
        .card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #1a1a2e;
            border-bottom: 2px solid #4ecca3;
            padding-bottom: 0.5rem;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.85; }
        .btn-primary  { background: #4ecca3; color: #1a1a2e; font-weight: 600; }
        .btn-danger   { background: #e74c3c; color: white; }
        .btn-secondary{ background: #6c757d; color: white; }

        /* ── Forms ── */
        .form-group { margin-bottom: 1rem; }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #555;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4ecca3;
        }

        /* ── Tables ── */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #f8f9fa; padding: 0.75rem; text-align: left; font-weight: 600; color: #555; }
        td { padding: 0.75rem; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9fa; }

        /* ── Status badges ── */
        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger  { background: #f8d7da; color: #721c24; }

        /* ── Page header ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .page-header h1 { font-size: 1.5rem; color: #1a1a2e; }
    </style>
</head>
<body>

{% if session.session_id %}
<nav>
    <a class="brand" href="{{ url_for('dashboard') }}">💰 Budget Optimizer</a>
    <div class="nav-links">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('subscriptions') }}">Subscriptions</a>
        <a href="{{ url_for('budget') }}">Budget</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</nav>
{% endif %}

<div class="flash-container">
    {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
