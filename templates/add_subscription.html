{% extends "base.html" %}
{% block title %}Add Subscription - Budget Optimizer{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add Subscription</h1>
    <a href="{{ url_for('subscriptions') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label>Subscription Name</label>
            <input type="text" name="name" placeholder="e.g. Netflix" required>
        </div>

        <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" placeholder="e.g. Entertainment" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label>Cost ($)</label>
                <input type="number" name="cost" step="0.01" min="0" placeholder="9.99" required>
            </div>

            <div class="form-group">
                <label>Billing Frequency</label>
                <select name="billing_frequency" required>
                    <option value="">-- Select --</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                    <option value="weekly">Weekly</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Renewal Date</label>
            <input type="date" name="renewal_date" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">
            Add Subscription
        </button>
    </form>
</div>
{% endblock %}
